# protoResearcher LangGraph agent configuration
# Used when AGENT_BACKEND=langgraph

model:
  provider: vllm  # cliproxy (Claude via OAuth) or vllm (local)
  name: local
  api_base: http://host.docker.internal:8000/v1
  api_key: none
  temperature: 0.3
  max_tokens: 4096
  max_iterations: 75

subagents:
  explorer:
    enabled: true
    tools: [discord_feed, huggingface, github_trending, browser]
    max_turns: 30
  analyst:
    enabled: true
    tools: [paper_reader, research_memory, browser]
    max_turns: 40
  writer:
    enabled: true
    tools: [research_memory, discord_feed]
    max_turns: 20

middleware:
  knowledge: true
  audit: true
  memory: true

knowledge:
  db_path: /sandbox/knowledge/research.db
  embed_model: qwen3-embedding:0.6b
  top_k: 10
  search_mode: hybrid  # hybrid (vector + keyword RRF), vector, keyword
  enrich_chunks: true   # prepend contextual headers to chunks before embedding
